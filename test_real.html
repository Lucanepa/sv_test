<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mode - SSK ZK Prep</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* --- Test Page Layout --- */
        .test-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        /* --- Header --- */
        .test-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            margin-bottom: 20px;
        }

        .test-header h1 {
            flex: 1;
            text-align: center;
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        /* --- Two-Column Test Container --- */
        .test-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* --- Left Sidebar: Question Overview --- */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            position: sticky;
            top: 16px;
        }

        .sidebar-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .question-indicator {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
        }

        .question-indicator:hover {
            border-color: var(--border-hover);
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .question-indicator.current {
            border-color: var(--accent);
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .question-indicator.answered {
            border-color: var(--bg-elevated);
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .question-indicator.answered.current {
            border-color: var(--accent);
        }

        .question-indicator.correct {
            border-color: var(--correct);
            background: var(--correct-bg);
            color: var(--correct);
        }

        .question-indicator.incorrect {
            border-color: var(--incorrect);
            background: var(--incorrect-bg);
            color: var(--incorrect);
        }

        /* --- Right Main: Question Card --- */
        .question-area {
            flex: 1;
            min-width: 0;
        }

        .question-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .question-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .answers-container {
            margin: 20px 0;
        }

        /* Review-mode answer states */
        .answer-option.correct-review {
            border-color: var(--correct);
            background: var(--correct-bg);
            color: var(--correct);
        }

        .answer-option.incorrect-review {
            border-color: var(--incorrect);
            background: var(--incorrect-bg);
            color: var(--incorrect);
        }

        .answer-option.user-selected-review {
            border-width: 3px;
            font-weight: 600;
        }

        .answer-option.review-disabled {
            pointer-events: none;
            cursor: default;
        }

        /* --- Navigation Controls --- */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .nav-circle {
            width: 52px;
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .nav-circle svg {
            width: 22px;
            height: 22px;
        }

        .nav-circle:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
        }

        .nav-circle:disabled {
            background: var(--bg-elevated);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .nav-circle:focus,
        .nav-circle:active,
        .nav-circle:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .clear-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }

        .clear-pill svg {
            width: 14px;
            height: 14px;
        }

        .clear-pill:hover {
            border-color: var(--border-hover);
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .clear-pill:focus,
        .clear-pill:active,
        .clear-pill:focus-visible {
            outline: none;
        }

        /* --- Results View --- */
        .results-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .results-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .results-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .results-icon svg {
            width: 28px;
            height: 28px;
        }

        .results-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .score-big {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 4px;
        }

        .score-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .score-fraction {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .performance-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .performance-badge.tier-excellent {
            background: var(--correct-bg);
            color: var(--correct);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .performance-badge.tier-good {
            background: var(--accent-subtle);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .performance-badge.tier-sufficient {
            background: rgba(234, 179, 8, 0.12);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .performance-badge.tier-fail {
            background: var(--incorrect-bg);
            color: var(--incorrect);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .results-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .results-actions .btn {
            min-width: 140px;
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--accent-subtle);
            border-radius: 50%;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .empty-state-icon svg {
            width: 28px;
            height: 28px;
        }

        .empty-state p {
            font-size: 0.875rem;
            line-height: 1.5;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .test-layout {
                padding: 12px;
            }

            .test-header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .test-header h1 {
                order: -1;
                flex-basis: 100%;
                text-align: center;
                margin-bottom: 4px;
            }

            .back-btn {
                order: 0;
            }

            .header-actions {
                order: 1;
                margin-left: auto;
            }

            .test-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                order: 2;
            }

            .question-area {
                order: 1;
            }

            .question-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 6px;
            }

            .question-indicator {
                width: 100%;
                height: 38px;
                font-size: 12px;
            }

            .question-card {
                padding: 20px;
            }

            .results-card {
                padding: 28px 20px;
            }

            .score-big {
                font-size: 2.5rem;
            }

            .results-actions {
                flex-direction: column;
            }

            .results-actions .btn {
                width: 100%;
            }

            .header-actions .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="test-layout">

        <!-- Header -->
        <header class="test-header">
            <a href="index.html" class="back-btn" aria-label="Back to home">
                <i data-lucide="arrow-left"></i>
            </a>
            <h1>Test Mode</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="start-btn" onclick="startNewTest()">
                    <i data-lucide="shuffle"></i> New Test
                </button>
                <button class="btn btn-outline" id="finish-btn" onclick="finishTest()" disabled>
                    <i data-lucide="flag"></i> Finish
                </button>
            </div>
        </header>

        <!-- Test Container: Sidebar + Question -->
        <div class="test-container hidden" id="test-container">

            <!-- Left Sidebar -->
            <aside class="sidebar">
                <div class="card" style="padding: 16px;">
                    <p class="sidebar-label">Questions</p>
                    <div class="question-grid" id="question-grid"></div>
                </div>
            </aside>

            <!-- Right Main -->
            <main class="question-area">
                <div class="question-card">
                    <div class="question-number" id="question-number"></div>
                    <div class="question-text" id="question-text"></div>
                    <img id="diagram" class="diagram hidden" alt="Question diagram">
                    <div class="answers-container" id="answers"></div>

                    <div class="nav-controls">
                        <button class="nav-circle" id="prev-btn" onclick="previousQuestion()" disabled aria-label="Previous question">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        <button class="clear-pill" onclick="clearCurrentQuestionAnswers()">
                            <i data-lucide="eraser"></i> Clear
                        </button>
                        <button class="nav-circle" id="next-btn" onclick="nextQuestion()" disabled aria-label="Next question">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <!-- Empty State (before test starts) -->
        <div id="empty-state" class="empty-state">
            <div class="empty-state-icon">
                <i data-lucide="clipboard-check"></i>
            </div>
            <p>Click <strong>New Test</strong> to start a 25-question exam simulation.</p>
        </div>

        <!-- Results View -->
        <div class="results-overlay hidden" id="results">
            <div class="results-card">
                <div class="results-icon" id="results-icon">
                    <i data-lucide="trophy"></i>
                </div>
                <div class="results-title">Test Results</div>
                <div class="score-big" id="score-percent"></div>
                <div class="score-label">Score</div>
                <div class="score-fraction" id="score-fraction"></div>
                <div class="performance-badge" id="performance-badge"></div>
                <div class="results-actions">
                    <button class="btn btn-outline" onclick="checkAnswers()">
                        <i data-lucide="search"></i> Check Answers
                    </button>
                    <button class="btn btn-primary" onclick="startNewTest()">
                        <i data-lucide="shuffle"></i> New Test
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // ===== State =====
        let questions = [];
        let currentTestQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let isReviewMode = false;

        // ===== Data Loading =====
        async function loadQuestions() {
            try {
                const lang = localStorage.getItem('selectedLang') || 'it';
                const cacheKey = 'offlineQuestions_' + lang;
                const cached = localStorage.getItem(cacheKey);

                let data;

                if (cached) {
                    try {
                        data = JSON.parse(cached);
                        console.log('Using cached questions for ' + lang.toUpperCase());
                    } catch (e) {
                        localStorage.removeItem(cacheKey);
                        data = null;
                    }
                }

                if (!data) {
                    const response = await fetch('questions_' + lang + '.json');
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    data = await response.json();
                    console.log('Loaded questions from server for ' + lang.toUpperCase());
                }

                // Replace image URLs with cached base64 if available
                const cachedDiagrams = localStorage.getItem('offlineDiagrams');
                if (cachedDiagrams) {
                    try {
                        const diagrams = JSON.parse(cachedDiagrams);
                        data.forEach(question => {
                            if (question.image_url && diagrams[question.image_url]) {
                                question.image_url = diagrams[question.image_url];
                            }
                        });
                    } catch (e) { /* ignore parse errors */ }
                }

                questions = processQuestionsForTest(data);
                console.log('Processed ' + questions.length + ' questions');
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('empty-state').innerHTML =
                    '<div class="empty-state-icon"><i data-lucide="alert-circle"></i></div>' +
                    '<p>Error loading questions. Please refresh the page.</p>';
                lucide.createIcons();
            }
        }

        // ===== Process Questions for Linked Groups =====
        function processQuestionsForTest(originalQuestions) {
            const processedQuestions = [];
            const processedLinks = new Set();

            // Group all linked questions by their base question
            const linkGroups = new Map();

            originalQuestions.forEach(question => {
                if (question.linked_to) {
                    const baseNumber = question.linked_to;
                    if (!linkGroups.has(baseNumber)) {
                        linkGroups.set(baseNumber, []);
                    }
                    linkGroups.get(baseNumber).push(question);
                }
            });

            // Sort each link group by link_order
            linkGroups.forEach((questions) => {
                questions.sort((a, b) => a.link_order - b.link_order);
            });

            // Process questions in order
            originalQuestions.forEach(question => {
                if (processedLinks.has(question.question_number)) {
                    return;
                }

                if (question.linked_to) {
                    const baseNumber = question.linked_to;
                    const linkedQuestions = linkGroups.get(baseNumber);

                    linkedQuestions.forEach(linkedQ => {
                        processedQuestions.push({
                            ...linkedQ,
                            is_linked: true,
                            link_group: baseNumber,
                            link_order: linkedQ.link_order,
                            prefix: ''
                        });
                        processedLinks.add(linkedQ.question_number);
                    });
                } else {
                    const isReferenced = originalQuestions.find(q =>
                        q.linked_to === question.question_number
                    );

                    if (!isReferenced) {
                        processedQuestions.push({
                            ...question,
                            is_linked: false,
                            link_group: null,
                            link_order: null,
                            prefix: ''
                        });
                    }
                }
            });

            return processedQuestions;
        }

        // ===== Fisher-Yates Shuffle with crypto =====
        function shuffleArray(array) {
            const shuffled = [...array];
            let randomValues;

            try {
                randomValues = new Uint32Array(shuffled.length);
                crypto.getRandomValues(randomValues);
            } catch (e) {
                randomValues = new Uint32Array(shuffled.length);
                for (let i = 0; i < shuffled.length; i++) {
                    randomValues[i] = Math.floor(Math.random() * 0x100000000);
                }
            }

            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = randomValues[i] % (i + 1);
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            return shuffled;
        }

        // ===== Start New Test =====
        function startNewTest() {
            currentQuestionIndex = 0;
            userAnswers = {};
            isReviewMode = false;

            const selectedQuestionNumbers = new Set();
            const finalTestQuestions = [];
            const allShuffledQuestions = shuffleArray([...questions]);

            console.log('Starting new test - shuffling all ' + questions.length + ' questions');

            let i = 0;
            while (finalTestQuestions.length < 25 && i < allShuffledQuestions.length) {
                const question = allShuffledQuestions[i];

                if (selectedQuestionNumbers.has(question.question_number)) {
                    i++;
                    continue;
                }

                if (question.is_linked) {
                    const linkGroup = questions.filter(q =>
                        q.is_linked && q.link_group === question.link_group
                    );

                    if (finalTestQuestions.length + linkGroup.length <= 25) {
                        linkGroup.forEach(linkedQ => {
                            if (!selectedQuestionNumbers.has(linkedQ.question_number)) {
                                finalTestQuestions.push({
                                    ...linkedQ,
                                    is_linked: true,
                                    link_group: question.link_group,
                                    link_order: linkedQ.link_order,
                                    prefix: ''
                                });
                                selectedQuestionNumbers.add(linkedQ.question_number);
                            }
                        });
                    }
                } else {
                    const isReferenced = questions.find(q =>
                        q.linked_to === question.question_number
                    );

                    if (!isReferenced) {
                        finalTestQuestions.push({
                            ...question,
                            is_linked: false,
                            link_group: null,
                            link_order: null,
                            prefix: ''
                        });
                        selectedQuestionNumbers.add(question.question_number);
                    }
                }

                i++;
            }

            // Fill remaining slots if needed
            if (finalTestQuestions.length < 25) {
                const remainingQuestions = questions.filter(q =>
                    !selectedQuestionNumbers.has(q.question_number) &&
                    !q.is_linked &&
                    !questions.find(refQ => refQ.linked_to === q.question_number)
                );

                const additionalShuffled = shuffleArray([...remainingQuestions]);
                for (let j = 0; j < additionalShuffled.length && finalTestQuestions.length < 25; j++) {
                    const question = additionalShuffled[j];
                    if (!selectedQuestionNumbers.has(question.question_number)) {
                        finalTestQuestions.push({
                            ...question,
                            is_linked: false,
                            link_group: null,
                            link_order: null,
                            prefix: ''
                        });
                        selectedQuestionNumbers.add(question.question_number);
                    }
                }
            }

            // Stable sort: linked groups stay consecutive
            finalTestQuestions.sort((a, b) => {
                if (a.is_linked && b.is_linked && a.link_group === b.link_group) {
                    return a.link_order - b.link_order;
                }
                return 0;
            });

            currentTestQuestions = finalTestQuestions;

            console.log('Test started with ' + finalTestQuestions.length + ' questions');
            console.log('Questions: ' + finalTestQuestions.map(q => q.question_number).join(', '));

            // Show test interface
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('test-container').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            // Enable finish button
            const finishBtn = document.getElementById('finish-btn');
            finishBtn.disabled = false;

            updateQuestionGrid();
            showQuestion(0);
        }

        // ===== Update Question Grid =====
        function updateQuestionGrid() {
            const grid = document.getElementById('question-grid');
            grid.innerHTML = '';

            currentTestQuestions.forEach((question, index) => {
                const indicator = document.createElement('div');
                indicator.className = 'question-indicator';
                indicator.textContent = index + 1;
                indicator.onclick = () => showQuestion(index);

                if (index === currentQuestionIndex) {
                    indicator.classList.add('current');
                }

                if (userAnswers[index] && userAnswers[index].length > 0) {
                    indicator.classList.add('answered');
                }

                if (isReviewMode) {
                    const isCorrect = checkAnswerCorrectness(index);
                    indicator.classList.remove('answered', 'current');
                    indicator.classList.add(isCorrect ? 'correct' : 'incorrect');
                    if (index === currentQuestionIndex) {
                        indicator.classList.add('current');
                    }
                }

                grid.appendChild(indicator);
            });
        }

        // ===== Show Question =====
        function showQuestion(index) {
            currentQuestionIndex = index;
            const question = currentTestQuestions[index];

            // Question number label
            const numberEl = document.getElementById('question-number');
            numberEl.textContent = 'Question ' + (index + 1) + ' of ' + currentTestQuestions.length;

            // Question text
            document.getElementById('question-text').textContent = question.question;

            // Diagram
            const diagramEl = document.getElementById('diagram');
            if (question.image_url) {
                diagramEl.src = question.image_url;
                diagramEl.classList.remove('hidden');
            } else {
                diagramEl.classList.add('hidden');
                diagramEl.removeAttribute('src');
            }

            // Answer options — reshuffled every time (intentional)
            const answersContainer = document.getElementById('answers');
            answersContainer.innerHTML = '';

            const answerEntries = Object.entries(question.answers);
            const shuffledAnswers = shuffleArray([...answerEntries]);

            shuffledAnswers.forEach(([key, value]) => {
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer-option';
                answerDiv.dataset.answer = key;

                const text = document.createElement('span');
                text.textContent = value;
                answerDiv.appendChild(text);

                // Restore previous selection
                if (userAnswers[index] && userAnswers[index].includes(key)) {
                    answerDiv.classList.add('selected');
                }

                if (isReviewMode) {
                    const isCorrect = question.correct.includes(key);
                    const wasSelected = userAnswers[index] && userAnswers[index].includes(key);

                    answerDiv.classList.add('review-disabled');

                    if (wasSelected) {
                        answerDiv.classList.add('user-selected-review');
                    }

                    if (isCorrect) {
                        answerDiv.classList.add('correct-review');
                        answerDiv.classList.remove('selected');
                    } else if (wasSelected) {
                        answerDiv.classList.add('incorrect-review');
                        answerDiv.classList.remove('selected');
                    }
                } else {
                    const handleSelection = () => {
                        const isCurrentlySelected = answerDiv.classList.contains('selected');

                        if (isCurrentlySelected) {
                            answerDiv.classList.remove('selected');
                        } else {
                            answerDiv.classList.add('selected');
                        }

                        // Collect all selected for this question
                        const selectedAnswers = [];
                        answersContainer.querySelectorAll('.answer-option.selected').forEach(opt => {
                            selectedAnswers.push(opt.dataset.answer);
                        });
                        userAnswers[index] = selectedAnswers;

                        updateQuestionGrid();
                    };

                    answerDiv.addEventListener('click', handleSelection);

                    answerDiv.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                    });

                    answerDiv.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        handleSelection();
                    });
                }

                answersContainer.appendChild(answerDiv);
            });

            // Navigation button states
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === currentTestQuestions.length - 1;

            updateQuestionGrid();

            // Re-render Lucide icons in nav controls
            lucide.createIcons();
        }

        // ===== Navigation =====
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentTestQuestions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }

        // ===== Clear Current Question =====
        function clearCurrentQuestionAnswers() {
            if (isReviewMode) return;

            if (userAnswers[currentQuestionIndex]) {
                delete userAnswers[currentQuestionIndex];
            }

            document.querySelectorAll('.answer-option.selected').forEach(opt => {
                opt.classList.remove('selected');
            });

            updateQuestionGrid();
        }

        // ===== Check Answer Correctness =====
        function checkAnswerCorrectness(questionIndex) {
            const question = currentTestQuestions[questionIndex];
            const selectedAnswers = userAnswers[questionIndex];

            if (!selectedAnswers || selectedAnswers.length === 0) return false;

            const correctAnswers = question.correct;
            return selectedAnswers.length === correctAnswers.length &&
                selectedAnswers.every(answer => correctAnswers.includes(answer));
        }

        // ===== Finish Test =====
        function finishTest() {
            if (!currentTestQuestions || currentTestQuestions.length === 0) {
                return;
            }

            let correctCount = 0;
            currentTestQuestions.forEach((question, index) => {
                if (checkAnswerCorrectness(index)) {
                    correctCount++;
                }
            });

            const score = Math.round((correctCount / 25) * 100);

            // Score display
            document.getElementById('score-percent').textContent = score + '%';
            document.getElementById('score-fraction').textContent = correctCount + ' / 25 correct';

            // Performance badge
            const badge = document.getElementById('performance-badge');
            const resultsIcon = document.getElementById('results-icon');

            let badgeClass, badgeText, iconBg;

            if (score >= 90) {
                badgeClass = 'tier-excellent';
                badgeText = 'SEHR GUT (Groups 1 & 2)';
                iconBg = 'var(--correct-bg)';
                resultsIcon.style.color = 'var(--correct)';
            } else if (score >= 80) {
                badgeClass = 'tier-good';
                badgeText = 'GUT (Group 3)';
                iconBg = 'var(--accent-subtle)';
                resultsIcon.style.color = 'var(--accent)';
            } else if (score >= 66) {
                badgeClass = 'tier-sufficient';
                badgeText = 'GENUGEND (2SR)';
                iconBg = 'rgba(234, 179, 8, 0.12)';
                resultsIcon.style.color = '#eab308';
            } else {
                badgeClass = 'tier-fail';
                badgeText = 'UNGENUGEND';
                iconBg = 'var(--incorrect-bg)';
                resultsIcon.style.color = 'var(--incorrect)';
            }

            badge.className = 'performance-badge ' + badgeClass;
            badge.textContent = badgeText;
            resultsIcon.style.background = iconBg;

            // Show results, hide test
            document.getElementById('test-container').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            lucide.createIcons();
        }

        // ===== Check Answers (Review Mode) =====
        function checkAnswers() {
            isReviewMode = true;

            document.getElementById('test-container').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            // Disable finish button during review
            document.getElementById('finish-btn').disabled = true;

            showQuestion(currentQuestionIndex);
        }

        // ===== Init =====
        loadQuestions();
    </script>
</body>
</html>
