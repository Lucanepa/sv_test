<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game - SSK ZK Prep</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* --- Card Game Specific --- */
        .question-text {
            font-size: 0.9375rem;
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-line;
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .question-number svg {
            width: 14px;
            height: 14px;
        }

        .answers {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .answer-text {
            flex: 1;
        }

        .answer-indicator {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-indicator svg {
            width: 18px;
            height: 18px;
        }

        .answer-indicator.indicator-correct {
            color: var(--correct);
        }

        .answer-indicator.indicator-incorrect {
            color: var(--incorrect);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .controls .btn {
            min-width: 140px;
        }

        .feedback {
            margin-top: 20px;
        }

        /* Completion card */
        .completion-card {
            text-align: center;
            padding: 48px 24px;
        }

        .completion-card .completion-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: var(--correct-bg);
            border-radius: 50%;
            color: var(--correct);
            margin-bottom: 20px;
        }

        .completion-card .completion-icon svg {
            width: 32px;
            height: 32px;
        }

        .completion-card h2 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .completion-card p {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.875rem;
        }

        /* Progress indicator */
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .progress-text {
            font-size: 0.8125rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-text svg {
            width: 14px;
            height: 14px;
        }

        .progress-bar-wrap {
            flex: 1;
            max-width: 200px;
            height: 4px;
            background: var(--bg-elevated);
            border-radius: 2px;
            overflow: hidden;
            margin-left: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width var(--transition);
            width: 0%;
        }

        /* Linked badge */
        .linked-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-subtle);
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .linked-badge svg {
            width: 12px;
            height: 12px;
        }

        /* Header balance placeholder */
        .header-balance {
            width: 40px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="page-container">

        <!-- Header -->
        <header class="page-header">
            <a href="index.html" class="back-btn" aria-label="Back to home">
                <i data-lucide="arrow-left"></i>
            </a>
            <h1>Card Game</h1>
            <div class="header-balance"></div>
        </header>

        <!-- Progress -->
        <div class="progress-row" id="progress-row">
            <span class="progress-text">
                <i data-lucide="layers"></i>
                <span id="progress-label">0 / 0</span>
            </span>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="card" id="question-card">
            <div class="question-number" id="question-number">
                <i data-lucide="hash"></i>
                <span></span>
            </div>
            <div class="question-text" id="question-text">Loading...</div>
            <img id="diagram" class="diagram hidden" alt="Question diagram">
            <div class="answers" id="answers"></div>

            <div class="controls">
                <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()" disabled>
                    <i data-lucide="check-circle"></i>
                    Check Answer
                </button>
                <button class="btn btn-success hidden" id="next-btn" onclick="nextQuestion()">
                    <i data-lucide="arrow-right"></i>
                    <span id="next-btn-text">Next</span>
                </button>
            </div>

            <div class="feedback hidden" id="feedback"></div>
        </div>

        <!-- Completion Card -->
        <div class="card completion-card hidden" id="completion-card">
            <div class="completion-icon">
                <i data-lucide="trophy"></i>
            </div>
            <h2>All questions completed!</h2>
            <p>You've answered all available questions in this session.</p>
            <button class="btn btn-primary" onclick="startNewSession()">
                <i data-lucide="refresh-cw"></i>
                Start New Session
            </button>
        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // --- State ---
        let questions = [];
        let currentQuestionIndex = 0;
        let answeredQuestions = new Set();
        let currentSessionQuestions = [];

        // --- Data Loading ---
        async function loadQuestions() {
            try {
                const lang = localStorage.getItem('selectedLang') || 'it';
                let data;

                // Try localStorage cache first
                const cacheKey = 'offlineQuestions_' + lang;
                const cached = localStorage.getItem(cacheKey);

                if (cached) {
                    try {
                        data = JSON.parse(cached);
                        console.log('Using cached questions for ' + lang);
                    } catch (e) {
                        localStorage.removeItem(cacheKey);
                        data = null;
                    }
                }

                if (!data) {
                    // Fetch from file
                    const response = await fetch('questions_' + lang + '.json');
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    data = await response.json();
                    console.log('Loaded questions from server for ' + lang);
                }

                // Resolve cached diagram images
                const cachedDiagrams = localStorage.getItem('offlineDiagrams');
                if (cachedDiagrams) {
                    try {
                        const diagrams = JSON.parse(cachedDiagrams);
                        data.forEach(function(question) {
                            if (question.image_url && diagrams[question.image_url]) {
                                question.image_url = diagrams[question.image_url];
                            }
                        });
                    } catch (e) { /* ignore parse errors */ }
                }

                // Process for linked questions
                questions = processQuestionsForCardGame(data);
                console.log('Processed ' + questions.length + ' question items (' + data.length + ' raw)');

                startNewSession();
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('question-text').textContent = 'Error loading questions. Please go back and select a language.';
            }
        }

        // --- Linked Question Processing ---
        function processQuestionsForCardGame(originalQuestions) {
            var processedQuestions = [];

            // Identify all linked question groups
            var linkGroups = new Map();

            originalQuestions.forEach(function(question) {
                if (question.linked_to) {
                    var baseNumber = question.linked_to;
                    if (!linkGroups.has(baseNumber)) {
                        linkGroups.set(baseNumber, []);
                    }
                    linkGroups.get(baseNumber).push(question);
                }
            });

            // Sort each link group by link_order
            linkGroups.forEach(function(groupQuestions) {
                groupQuestions.sort(function(a, b) { return a.link_order - b.link_order; });
            });

            // Process each question
            originalQuestions.forEach(function(question) {
                if (question.linked_to) {
                    // Linked question: only add the first one (link_order === 1)
                    var baseNumber = question.linked_to;
                    var linkedQuestions = linkGroups.get(baseNumber);

                    if (question.link_order === 1) {
                        processedQuestions.push({
                            type: 'linked_first',
                            question: question,
                            linkGroup: baseNumber,
                            allLinkedQuestions: linkedQuestions
                        });
                    }
                    // Other linked questions are skipped; they show sequentially
                } else {
                    // Check if this question is referenced as a linked_to target
                    var isReferenced = originalQuestions.find(function(q) {
                        return q.linked_to === question.question_number;
                    });

                    if (!isReferenced) {
                        processedQuestions.push({
                            type: 'single',
                            question: question
                        });
                    }
                }
            });

            return processedQuestions;
        }

        // --- Session Management ---
        function startNewSession() {
            answeredQuestions.clear();
            currentQuestionIndex = 0;

            var availableQuestions = questions.filter(function(q) {
                if (q.type === 'linked_first') {
                    return !q.allLinkedQuestions.some(function(linkedQ) {
                        return answeredQuestions.has(linkedQ.question_number);
                    });
                }
                return !answeredQuestions.has(q.question.question_number);
            });

            currentSessionQuestions = shuffleArray([].concat(availableQuestions));

            if (currentSessionQuestions.length === 0) {
                answeredQuestions.clear();
                startNewSession();
                return;
            }

            // Show question card, hide completion
            document.getElementById('question-card').classList.remove('hidden');
            document.getElementById('completion-card').classList.add('hidden');

            updateProgress();
            showRandomQuestion();
        }

        function shuffleArray(array) {
            var shuffled = [].concat(array);
            for (var i = shuffled.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }
            return shuffled;
        }

        // --- Progress ---
        function updateProgress() {
            var total = currentSessionQuestions.length;
            var current = Math.min(currentQuestionIndex + 1, total);
            document.getElementById('progress-label').textContent = current + ' / ' + total;
            var pct = total > 0 ? (currentQuestionIndex / total) * 100 : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        // --- Display ---
        function showRandomQuestion() {
            if (currentQuestionIndex >= currentSessionQuestions.length) {
                showCompletionMessage();
                return;
            }

            var item = currentSessionQuestions[currentQuestionIndex];
            displayQuestion(item);
            updateProgress();
        }

        function displayQuestion(item) {
            // Reset UI
            var checkBtn = document.getElementById('check-btn');
            var nextBtn = document.getElementById('next-btn');
            var feedback = document.getElementById('feedback');
            var nextBtnText = document.getElementById('next-btn-text');

            checkBtn.classList.remove('hidden');
            checkBtn.disabled = true;
            nextBtn.classList.add('hidden');
            nextBtnText.textContent = 'Next';
            feedback.classList.add('hidden');
            feedback.className = 'feedback hidden';

            if (item.type === 'linked_first') {
                displayLinkedQuestion(item);
            } else {
                displaySingleQuestion(item.question);
            }

            // Re-create Lucide icons for dynamically added elements
            lucide.createIcons();
        }

        function displaySingleQuestion(question) {
            var questionNumber = document.getElementById('question-number');
            var questionText = document.getElementById('question-text');
            var answersContainer = document.getElementById('answers');
            var diagramElement = document.getElementById('diagram');

            // Question number
            questionNumber.querySelector('span').textContent = 'Question ' + question.question_number;

            // Question text
            questionText.textContent = question.question;

            // Diagram
            if (question.image_url) {
                diagramElement.src = question.image_url;
                diagramElement.classList.remove('hidden');
            } else {
                diagramElement.classList.add('hidden');
            }

            // Answers
            answersContainer.innerHTML = '';
            var answerEntries = Object.entries(question.answers);
            var shuffledAnswers = shuffleArray([].concat(answerEntries));

            shuffledAnswers.forEach(function(entry) {
                var key = entry[0];
                var value = entry[1];

                var answerDiv = document.createElement('div');
                answerDiv.className = 'answer-option';
                answerDiv.dataset.answer = key;

                var text = document.createElement('span');
                text.className = 'answer-text';
                text.textContent = value;

                answerDiv.appendChild(text);

                answerDiv.addEventListener('click', function() {
                    selectAnswer(key);
                });

                answersContainer.appendChild(answerDiv);
            });
        }

        function displayLinkedQuestion(item) {
            var questionNumber = document.getElementById('question-number');
            var questionText = document.getElementById('question-text');
            var answersContainer = document.getElementById('answers');
            var diagramElement = document.getElementById('diagram');

            var question = item.question;

            // Safety check
            if (!question || !question.answers) {
                console.error('Invalid linked question object:', item);
                questionText.textContent = 'Error: Invalid question data';
                answersContainer.innerHTML = '';
                diagramElement.classList.add('hidden');
                return;
            }

            // Question number with linked badge
            var linkOrder = question.link_order || 1;
            var totalLinked = item.allLinkedQuestions.length;
            var numberSpan = questionNumber.querySelector('span');
            numberSpan.innerHTML = 'Question ' + question.question_number +
                ' <span class="linked-badge"><i data-lucide="link"></i> ' +
                linkOrder + '/' + totalLinked + '</span>';

            // Question text
            questionText.textContent = question.question;

            // Diagram
            if (question.image_url) {
                diagramElement.src = question.image_url;
                diagramElement.classList.remove('hidden');
            } else {
                diagramElement.classList.add('hidden');
            }

            // Answers
            answersContainer.innerHTML = '';
            var answerEntries = Object.entries(question.answers);
            var shuffledAnswers = shuffleArray([].concat(answerEntries));

            shuffledAnswers.forEach(function(entry) {
                var key = entry[0];
                var value = entry[1];

                var answerDiv = document.createElement('div');
                answerDiv.className = 'answer-option';
                answerDiv.dataset.answer = key;

                var text = document.createElement('span');
                text.className = 'answer-text';
                text.textContent = value;

                answerDiv.appendChild(text);

                answerDiv.addEventListener('click', function() {
                    selectAnswer(key);
                });

                answersContainer.appendChild(answerDiv);
            });
        }

        // --- Selection ---
        function selectAnswer(answerKey) {
            var el = document.querySelector('[data-answer="' + answerKey + '"]');
            if (!el) return;
            el.classList.toggle('selected');

            // Enable check button if at least one answer selected
            var selected = document.querySelectorAll('.answer-option.selected');
            document.getElementById('check-btn').disabled = selected.length === 0;
        }

        // --- Check Answer ---
        function checkAnswer() {
            var currentItem = currentSessionQuestions[currentQuestionIndex];
            var selectedAnswers = Array.from(document.querySelectorAll('.answer-option.selected'))
                .map(function(opt) { return opt.dataset.answer; });

            var question = currentItem.question;
            var correctAnswers = question.correct;
            var isCorrect = selectedAnswers.length === correctAnswers.length &&
                selectedAnswers.every(function(a) { return correctAnswers.includes(a); });

            // Disable all answer options
            document.querySelectorAll('.answer-option').forEach(function(option) {
                option.style.pointerEvents = 'none';
                option.style.cursor = 'default';
            });

            // Mark answers with visual indicators
            document.querySelectorAll('.answer-option').forEach(function(option) {
                var answerKey = option.dataset.answer;
                var isSelected = selectedAnswers.includes(answerKey);
                var isCorrectAnswer = correctAnswers.includes(answerKey);
                var textContent = option.querySelector('.answer-text').textContent;

                // Remove old indicator if any
                var oldIndicator = option.querySelector('.answer-indicator');
                if (oldIndicator) oldIndicator.remove();

                if (isSelected && isCorrectAnswer) {
                    option.classList.add('correct');
                    option.innerHTML = '<span class="answer-text">' + escapeHtml(textContent) +
                        '</span><span class="answer-indicator indicator-correct"><i data-lucide="check"></i></span>';
                } else if (isSelected && !isCorrectAnswer) {
                    option.classList.add('incorrect');
                    option.innerHTML = '<span class="answer-text">' + escapeHtml(textContent) +
                        '</span><span class="answer-indicator indicator-incorrect"><i data-lucide="x"></i></span>';
                } else if (!isSelected && isCorrectAnswer) {
                    option.classList.add('correct');
                    option.innerHTML = '<span class="answer-text">' + escapeHtml(textContent) +
                        '</span><span class="answer-indicator indicator-correct"><i data-lucide="check"></i></span>';
                }
            });

            // Build feedback message
            var feedbackMessage = '';
            if (isCorrect) {
                feedbackMessage = 'Correct! Well done.';
            } else {
                var correctTexts = correctAnswers.map(function(key) { return question.answers[key]; });
                feedbackMessage = 'Incorrect. The correct answer' +
                    (correctAnswers.length > 1 ? 's are' : ' is') + ':';
                correctTexts.forEach(function(txt) {
                    feedbackMessage += '\n\u2022 ' + txt;
                });
            }

            // Show feedback
            var feedbackEl = document.getElementById('feedback');
            feedbackEl.textContent = feedbackMessage;
            feedbackEl.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');

            if (isCorrect) {
                answeredQuestions.add(question.question_number);

                // For linked questions, check if there are more in the sequence
                // Important: do NOT mutate currentItem.question here
                if (currentItem.type === 'linked_first') {
                    var currentLinkOrder = question.link_order || 1;
                    var nextLinkedQuestion = currentItem.allLinkedQuestions.find(function(q) {
                        return q.link_order === currentLinkOrder + 1;
                    });

                    if (nextLinkedQuestion) {
                        document.getElementById('next-btn-text').textContent = 'Next Linked Question';
                    }
                }
            }

            // Toggle buttons
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');

            // Re-create Lucide icons for check/x indicators
            lucide.createIcons();
        }

        // --- Next Question ---
        function nextQuestion() {
            var currentItem = currentSessionQuestions[currentQuestionIndex];

            // If in a linked question sequence, advance within the group
            if (currentItem.type === 'linked_first') {
                var currentLinkOrder = currentItem.question.link_order || 1;
                var nextLinkedQuestion = currentItem.allLinkedQuestions.find(function(q) {
                    return q.link_order === currentLinkOrder + 1;
                });

                if (nextLinkedQuestion) {
                    // Advance to next linked question without mutating the original
                    currentItem.question = nextLinkedQuestion;
                    displayQuestion(currentItem);
                    return;
                }
            }

            // Move to next item
            currentQuestionIndex++;
            document.getElementById('next-btn-text').textContent = 'Next';
            showRandomQuestion();
        }

        // --- Completion ---
        function showCompletionMessage() {
            document.getElementById('question-card').classList.add('hidden');
            document.getElementById('completion-card').classList.remove('hidden');
            document.getElementById('progress-row').classList.add('hidden');

            // Update progress to 100%
            document.getElementById('progress-bar').style.width = '100%';

            lucide.createIcons();
        }

        // --- Utility ---
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // --- Init ---
        loadQuestions();
    </script>
</body>
</html>
